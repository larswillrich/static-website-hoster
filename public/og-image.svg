<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#08080a"/>
      <stop offset="100%" stop-color="#131316"/>
    </linearGradient>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8793a"/>
      <stop offset="100%" stop-color="#c4612e"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="rgba(232,121,58,0.08)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03" stroke="white" stroke-width="1">
    <line x1="0" y1="0" x2="1200" y2="630"/>
    <line x1="200" y1="0" x2="1200" y2="500"/>
    <line x1="0" y1="130" x2="1000" y2="630"/>
    <line x1="400" y1="0" x2="1200" y2="400"/>
  </g>

  <!-- Logo icon -->
  <g transform="translate(520, 160)">
    <rect width="80" height="80" rx="20" fill="url(#logoGrad)"/>
    <!-- Page with arrow -->
    <g transform="translate(18, 14) scale(1.8)">
      <path d="M4 2h8l5 5v13a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2z" fill="white" opacity="0.95"/>
      <path d="M12 2v4a1 1 0 0 0 1 1h4" fill="none" stroke="white" stroke-width="0.5" opacity="0.4"/>
    </g>
    <circle cx="56" cy="58" r="14" fill="#1a1a20" opacity="0.9"/>
    <path d="M56 50v16" stroke="#e8793a" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M51 55l5-5 5 5" stroke="#e8793a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Title -->
  <text x="600" y="310" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="56" font-weight="700" fill="#ececef" letter-spacing="-1.5">HostMyPage</text>

  <!-- Subtitle -->
  <text x="600" y="365" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="24" fill="#7c7c86">Drop a file. Get a link. Instantly.</text>

  <!-- Domain pill -->
  <rect x="470" y="410" width="260" height="44" rx="22" fill="rgba(232,121,58,0.08)" stroke="rgba(232,121,58,0.15)" stroke-width="1"/>
  <text x="600" y="438" text-anchor="middle" font-family="'SF Mono', 'Fira Code', Menlo, Consolas, monospace" font-size="17" fill="#e8793a">host-my-page.com</text>

  <!-- Bottom accent line -->
  <rect x="0" y="624" width="1200" height="6" fill="url(#logoGrad)"/>
</svg>
